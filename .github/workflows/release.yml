name: Build and Release Extension

on:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Zip Extension Files
        run: |
          set -euo pipefail
          files=(
            manifest.json
            sportslottery-my-bets.user.js
            inject.js
            icon128.png
            README.md
            PRIVACY.md
          )
          for file in "${files[@]}"; do
            test -f "$file"
          done
          zip -r sportslottery-extension.zip "${files[@]}"

      - name: Verify Extension Package
        run: |
          set -euo pipefail
          unzip -l sportslottery-extension.zip
          for file in manifest.json sportslottery-my-bets.user.js inject.js icon128.png README.md PRIVACY.md; do
            unzip -Z1 sportslottery-extension.zip | grep -qx "$file"
          done
        
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: sportslottery-extension.zip
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: Auto-generated release from latest push.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
