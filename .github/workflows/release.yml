name: Build and Release Extension

on:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Run Tests
        run: npm test

      - name: Generate Release Notes
        run: |
          set -euo pipefail
          previous_tag="$(git tag --sort=-v:refname | head -n 1 || true)"

          {
            echo "## 這次更動"
            echo
            if [ -n "$previous_tag" ]; then
              git log --pretty=format:'- %s (%h)' "$previous_tag"..HEAD
            else
              git log --pretty=format:'- %s (%h)' -n 10
            fi
            echo
            echo
            echo "## 驗證"
            echo
            echo "- npm test"
            echo "- 檢查 extension zip 必要檔案"
          } > release-notes.md

      - name: Zip Extension Files
        run: |
          set -euo pipefail
          files=(
            manifest.json
            sportslottery-my-bets.user.js
            inject.js
            icon128.png
            README.md
            PRIVACY.md
          )
          for file in "${files[@]}"; do
            test -f "$file"
          done
          zip -r sportslottery-extension.zip "${files[@]}"

      - name: Verify Extension Package
        run: |
          set -euo pipefail
          unzip -l sportslottery-extension.zip
          for file in manifest.json sportslottery-my-bets.user.js inject.js icon128.png README.md PRIVACY.md; do
            unzip -Z1 sportslottery-extension.zip | grep -qx "$file"
          done
        
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: sportslottery-extension.zip
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body_path: release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
