name: Build and Release Extension

on:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Run Tests
        run: npm test

      - name: Generate Release Notes
        run: |
          set -euo pipefail
          previous_tag="$(git tag --sort=-v:refname | head -n 1 || true)"

          {
            echo "## 這次更動"
            echo
            wrote_note=false
            if [ -n "$previous_tag" ]; then
              range="$previous_tag..HEAD"
            else
              range="-n 10"
            fi
            while IFS=$'\t' read -r hash subject; do
              files="$(git diff-tree --no-commit-id --name-only -r "$hash")"
              if [ "$files" = "AGENTS.md" ]; then
                continue
              fi
              echo "- ${subject} (${hash:0:7})"
              wrote_note=true
            done < <(git log --pretty=format:'%H%x09%s' $range)
            if [ "$wrote_note" = false ]; then
              echo "- 無公開功能變更"
            fi
            echo
            echo
            echo "## 驗證"
            echo
            echo "- npm test"
            echo "- 檢查 extension zip 必要檔案"
          } > release-notes.md

      - name: Zip Extension Files
        run: |
          set -euo pipefail
          files=(
            manifest.json
            sportslottery-my-bets.user.js
            inject.js
            icon128.png
            README.md
            PRIVACY.md
          )
          for file in "${files[@]}"; do
            test -f "$file"
          done
          zip -r sportslottery-extension.zip "${files[@]}"

      - name: Verify Extension Package
        run: |
          set -euo pipefail
          unzip -l sportslottery-extension.zip
          for file in manifest.json sportslottery-my-bets.user.js inject.js icon128.png README.md PRIVACY.md; do
            unzip -Z1 sportslottery-extension.zip | grep -qx "$file"
          done
        
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: sportslottery-extension.zip
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body_path: release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
