name: Backfill Release Notes

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/backfill-release-notes.yml"
      - "scripts/backfill_release_notes.py"

jobs:
  backfill:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Backfill Release Notes
        run: python scripts/backfill_release_notes.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
